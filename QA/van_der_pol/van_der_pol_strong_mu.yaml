physical:
  g: 1.0
  L: 1.0
  # Strongly nonlinear Van der Pol coefficient: -mu * (1 - theta^2) with mu = 8
  damping_model: polynomial
  damping_linear: -8.0
  damping_cubic: 8.0
  theta0: 2.0
  theta_dot0: 0.0
  restoring_force_model: polynomial
  restoring_force_linear: 1.0
  restoring_force_cubic: 0.0

simulation:
  t_start: 0.0
  t_end: 30.0
  dt: 0.001
  output_every: 1

settings:
  plotting_method: new
  show_plot: false
  save_png: true
  plot_phase_map: true
  run_plotter: true
  data_file: "QA/van_der_pol/outputs/van_der_pol_strong_mu.dat"
  output_png: "QA/van_der_pol/outputs/van_der_pol_strong_mu.png"
  python_script: "QA/van_der_pol/outputs/plot_van_der_pol_strong_mu.py"
  integrator: "rk5"
  error_analysis: hd_reference
  error_reference_factor: 20
