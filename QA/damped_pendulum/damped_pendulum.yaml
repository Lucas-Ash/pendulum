physical:
  g: 9.81
  L: 1.0
  gamma: 0.7
  theta0: 0.3
  theta_dot0: -0.8

simulation:
  t_start: 0.0
  t_end: 15.0
  dt: 0.001
  output_every: 10

settings:
  plotting_method: new   # original=gnuplot, new=python/matplotlib
  show_plot: true
  save_png: true
  run_plotter: true           # only used by plotting_method: new
  data_file: "QA/damped_pendulum/outputs/damped_pendulum_1.dat"
  output_png: "QA/damped_pendulum/outputs/damped_pendulum_1.png"
  python_script: "QA/damped_pendulum/outputs/plot_damped_pendulum.py"
