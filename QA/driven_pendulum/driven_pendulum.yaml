physical:
  g: 9.81
  L: 1.0
  damping: 0.5
  A: 0.5
  omega_drive: 1.2
  theta0: 0.1
  omega0: 0.0

simulation:
  t_start: 0.0
  t_end: 50.0
  dt: 0.001
  output_every: 10

integrator: "rk5"

settings:
  error_analysis: hd_reference
  error_reference_factor: 50
  plotting_method: new
  show_plot: false
  save_png: true
  plot_phase_map: true
  run_plotter: true
  data_file: "QA/driven_pendulum/outputs/driven_pendulum_data.csv"
  output_png: "QA/driven_pendulum/outputs/driven_pendulum_comparison.png"
  python_script: "QA/driven_pendulum/outputs/plot_driven_pendulum.py"
