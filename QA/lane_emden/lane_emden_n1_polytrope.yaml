# Exact n=1 Lane-Emden branch:
# dimensionless density profile for a spherical polytropic star.
physical:
  g: 1.0
  L: 1.0
  gamma: 0.0
  damping_model: linear
  theta0: 0.99958338541356662
  theta_dot0: -0.016662500372005559
  restoring_force_model: polynomial
  restoring_force_linear: 0.0
  restoring_force_cubic: 0.0
  additional_terms:
    time_damping_enabled: true
    time_damping_coefficient: 2.0
    time_damping_power: 1.0
    time_damping_shift: 0.0
    state_power_enabled: true
    state_power_strength: 1.0
    state_power_exponent: 1.0
    state_power_mode: positive_only

simulation:
  t_start: 0.05
  t_end: 2.5
  dt: 0.001
  output_every: 1

settings:
  plotting_method: new
  show_plot: false
  save_png: false
  plot_phase_map: false
  run_plotter: false
  data_file: "QA/lane_emden/outputs/lane_emden_n1_polytrope.dat"
  output_png: "QA/lane_emden/outputs/lane_emden_n1_polytrope.png"
  python_script: "QA/lane_emden/outputs/plot_lane_emden_n1_polytrope.py"
  integrator: "rk5"
  analytical_model: "lane_emden"
  error_analysis: analytical
  error_reference_factor: 50
